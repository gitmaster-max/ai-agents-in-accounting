/* Daily micro targets (adult male RDA-style) */
const MICRO_TARGETS = [
  ["fiber", "Fiber", 30, "g"],
  ["ca", "Calcium", 1000, "mg"],
  ["fe", "Iron", 18, "mg"],
  ["b12", "Vitamin B12", 2.4, "µg"],
  ["d", "Vitamin D", 15, "µg"],
  ["zn", "Zinc", 11, "mg"],
  ["mg", "Magnesium", 400, "mg"],
  ["k", "Potassium", 3500, "mg"],
  ["vc", "Vitamin C", 90, "mg"],
];
const NUTRIENT_KEYS = ["kcal", "p", "c", "f", "fiber", "ca", "fe", "b12", "d", "zn", "mg", "k", "vc"];

/* DAREBEETS formulas: maintenance = kg × 40; −10% fat loss, +10% muscle gain.
   Protein 1.6–1.8 g/kg, fat 25% of Calories, carbs = remainder. */
function computeTargets(profile) {
  const w = Number(profile.weight) || 0;
  const maintenance = w * 40;
  const kcal = Math.round(profile.goal === "gain" ? maintenance * 1.1 : maintenance * 0.9);
  const p = Math.round(w * (profile.goal === "gain" ? 1.8 : 1.6));
  const f = Math.round((kcal * 0.25) / 9);
  const c = Math.max(0, Math.round((kcal - p * 4 - f * 9) / 4));
  return { maintenance: Math.round(maintenance), kcal, p, f, c };
}

const QUICK_FILL = {
  gain: { Breakfast: ["musl", "whey", "bana"], Lunch: ["rajc", "curd", "sprt"], Snack: ["gyog", "almo", "pbar"], Dinner: ["pbhu", "roti", "soya"] },

const emptyWeek = () => Object.fromEntries(DAYS.map((d) => [d, Object.fromEntries(MEALS.map((m) => [m, []]))]));

/* ===== Greedy gap-filler: pick foods that best close today's deficits ===== */
function suggestFixes(totals, targets, foods) {
  const sim = { ...totals };
  const picks = [];
  const candidates = foods.filter((f) => f.kcal > 0 || f.p > 0 || MICRO_TARGETS.some(([k]) => f[k] > 0));
  for (let i = 0; i < 12; i++) {
    const room = targets.kcal - sim.kcal;
    if (room < 60 && sim.p >= targets.p) break;
    let best = null, bestScore = 0;
    candidates.forEach((f) => {
      if (f.kcal > Math.max(room, 0) + 80) return;
      let s = 0;
      if (sim.p < targets.p) s += Math.min(f.p, targets.p - sim.p) * 3;
      MICRO_TARGETS.forEach(([k, , tgt]) => {
        const gap = Math.max(0, tgt - sim[k]) / tgt;
        s += Math.min((f[k] || 0) / tgt, gap) * 40;
      });
      if (room > 0) s += (Math.min(f.kcal, room) / room) * 12;
      const rep = picks.filter((x) => x.id === f.id).length;
      s -= rep * 20;
      if (s > bestScore) { bestScore = s; best = f; }
    });
    if (!best || bestScore <= 2) break;
    picks.push({ id: best.id });
    NUTRIENT_KEYS.forEach((k) => (sim[k] += best[k] || 0));
  }
  const counts = {};
  picks.forEach(({ id }) => (counts[id] = (counts[id] || 0) + 1));
  return { picks: Object.entries(counts).map(([id, qty]) => ({ id, qty })), projected: sim };
}

/* ===== Claude API helpers (AI features) =====
   On GitHub Pages there is no claude.ai proxy, so calls go directly from the
   browser to the Anthropic API using the visitor's own key, stored ONLY in
   this browser's localStorage. */
const KEY_STORAGE = "fw_anthropic_key";
const getApiKey = () => { try { return localStorage.getItem(KEY_STORAGE) || ""; } catch (e) { return ""; } };
const NO_KEY_MSG = "AI features need your Anthropic API key — click \u{1F511} AI setup in the header (the key is stored only in this browser).";
const BAD_KEY_MSG = "Your API key was rejected — recheck it in \u{1F511} AI setup.";

async function askClaudeJSON(prompt, useSearch) {
  const apiKey = getApiKey();
  if (!apiKey) { const e = new Error(NO_KEY_MSG); e.code = "NO_KEY"; throw e; }
  const body = {
    model: "claude-sonnet-4-6",
    max_tokens: 1000,
    messages: [{ role: "user", content: prompt }],
  };
  if (useSearch) body.tools = [{ type: "web_search_20260209", name: "web_search" }];
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const e = new Error(res.status === 401 ? BAD_KEY_MSG : "API error " + res.status);
    e.code = res.status === 401 ? "BAD_KEY" : "API";
    throw e;
  }
  const data = await res.json();
  const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const m = clean.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("No JSON in response");
  return JSON.parse(m[0]);
}

const T = {
  ink: "#152820", soft: "#5C7266", line: "#DCE6DE", bg: "#F3F7F4", card: "#FFFFFF",
  green: "#1D5C3F", greenSoft: "#E6F1EA", mango: "#F5A623", mangoSoft: "#FDF1DC", red: "#C64B3C",
};

function Bar({ label, val, target, unit, over }) {
  const pct = target > 0 ? Math.min(100, (val / target) * 100) : 0;
  const isOver = val > target * 1.05;
  const color = over && isOver ? T.red : pct >= 90 ? T.green : T.mango;
  return (
    <div className="mb-2">
      <div className="flex justify-between text-xs" style={{ color: T.soft }}>
        <span>{label}</span>
        <span style={{ color: T.ink, fontWeight: 600 }}>
          {Math.round(val * 10) / 10}
          <span style={{ color: T.soft, fontWeight: 400 }}> / {target} {unit}</span>
        </span>
      </div>
      <div className="h-1.5 rounded-full mt-1" style={{ background: T.line }}>
        <div className="h-1.5 rounded-full" style={{ width: pct + "%", background: color, transition: "width .3s" }} />
      </div>
    </div>
  );
}

function Spinner({ text }) {
  return (
    <div className="flex flex-col items-center gap-3 py-10">
      <div className="w-8 h-8 rounded-full animate-spin"
        style={{ border: `3px solid ${T.line}`, borderTopColor: T.green }} />
      <div className="text-sm" style={{ color: T.soft }}>{text}</div>
    </div>
  );
}

function MealPlanner() {
  const [profile, setProfile] = useState({ age: 28, height: 175, weight: 70, fatPct: 18, goal: "gain" });
  const [plan, setPlan] = useState(emptyWeek);
  const [day, setDay] = useState("Monday");
  const [cat, setCat] = useState("All");
  const [q, setQ] = useState("");
  const [selFood, setSelFood] = useState(null);
  const [addTo, setAddTo] = useState("Breakfast");
  const [dragId, setDragId] = useState(null);
  const [overMeal, setOverMeal] = useState(null);
  const [grocery, setGrocery] = useState(false);
  const [copied, setCopied] = useState(false);

  // API key setup (GitHub Pages: bring your own key, stored in localStorage)
  const [keyModal, setKeyModal] = useState(false);
  const [keyInput, setKeyInput] = useState("");
  const [hasKey, setHasKey] = useState(() => !!getApiKey());

  // Custom foods (AI-estimated)
  const [customFoods, setCustomFoods] = useState([]);
  const [addFoodModal, setAddFoodModal] = useState(false);
  const [newFood, setNewFood] = useState({ name: "", serv: "" });
  const [estimating, setEstimating] = useState(false);
  const [estimated, setEstimated] = useState(null);
  const [estError, setEstError] = useState("");

  // Gap filler
  const [fixModal, setFixModal] = useState(false);
  const [fixResult, setFixResult] = useState(null);

  // Recipe page
  const [page, setPage] = useState("planner"); // planner | recipe
  const [recipeFood, setRecipeFood] = useState(null);
  const [recipe, setRecipe] = useState(null);
  const [recipeLoading, setRecipeLoading] = useState(false);
  const [recipeError, setRecipeError] = useState("");

  const allFoods = useMemo(() => [...BASE_FOODS, ...customFoods], [customFoods]);
  const foodMap = useMemo(() => Object.fromEntries(allFoods.map((f) => [f.id, f])), [allFoods]);
  const cats = useMemo(() => ["All", ...Array.from(new Set(allFoods.map((f) => f.cat)))], [allFoods]);

  const targets = useMemo(() => computeTargets(profile), [profile]);
  const hM = (Number(profile.height) || 0) / 100;
  const bmi = hM > 0 ? (Number(profile.weight) || 0) / (hM * hM) : 0;

  const saveKey = () => {
    try {
      if (keyInput.trim()) localStorage.setItem(KEY_STORAGE, keyInput.trim());
      else localStorage.removeItem(KEY_STORAGE);
    } catch (e) {}
    setHasKey(!!getApiKey());
    setKeyModal(false);
  };
  const clearKey = () => {
    try { localStorage.removeItem(KEY_STORAGE); } catch (e) {}
    setKeyInput("");
    setHasKey(false);
  };

  const addFood = (meal, id, d = day) =>
    setPlan((p) => {
      const items = p[d][meal];
      const i = items.findIndex((x) => x.id === id);
      const next = i >= 0 ? items.map((x, j) => (j === i ? { ...x, qty: x.qty + 1 } : x)) : [...items, { id, qty: 1 }];
      return { ...p, [d]: { ...p[d], [meal]: next } };
    });
  const setQty = (meal, id, delta) =>
    setPlan((p) => ({
      ...p,
      [day]: { ...p[day], [meal]: p[day][meal].map((x) => (x.id === id ? { ...x, qty: x.qty + delta } : x)).filter((x) => x.qty > 0) },
    }));
  const clearDay = () => setPlan((p) => ({ ...p, [day]: Object.fromEntries(MEALS.map((m) => [m, []])) }));
  const quickFill = () =>
    setPlan((p) => ({ ...p, [day]: Object.fromEntries(MEALS.map((m) => [m, QUICK_FILL[profile.goal][m].map((id) => ({ id, qty: 1 }))])) }));

  const sumDay = (d) => {
    const t = Object.fromEntries(NUTRIENT_KEYS.map((k) => [k, 0]));
    MEALS.forEach((m) =>
      plan[d][m].forEach(({ id, qty }) => {
        const f = foodMap[id];
        if (f) NUTRIENT_KEYS.forEach((k) => (t[k] += (f[k] || 0) * qty));
      })
    );
    return t;
  };
  const dayTotals = useMemo(() => sumDay(day), [plan, day, foodMap]);
  const dayKcal = (d) => Math.round(sumDay(d).kcal);
  const dayMet = (d) => {
    const t = sumDay(d);
    return t.kcal >= targets.kcal * 0.95 && t.kcal <= targets.kcal * 1.1 && t.p >= targets.p * 0.9;
  };

  const groceryList = useMemo(() => {
    const count = {};
    DAYS.forEach((d) => MEALS.forEach((m) => plan[d][m].forEach(({ id, qty }) => (count[id] = (count[id] || 0) + qty))));
    const byCat = {};
    Object.entries(count).forEach(([id, n]) => {
      const f = foodMap[id];
      if (f) (byCat[f.cat] = byCat[f.cat] || []).push({ ...f, n });
    });
    return byCat;
  }, [plan, foodMap]);

  const copyGrocery = () => {
    const text = Object.entries(groceryList)
      .map(([c, items]) => c + "\n" + items.map((i) => `  • ${i.name} — ${i.n} × ${i.serv}`).join("\n"))
      .join("\n\n");
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1500); };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(done);
    else done();
  };

  /* ---- Fill gaps ---- */
  const openFix = () => {
    setFixResult(suggestFixes(dayTotals, targets, allFoods.filter((f) => f.cat !== "Supplements" || ["mult", "vitd", "b12t"].includes(f.id))));
    setFixModal(true);
  };
  const applyFix = () => {
    if (!fixResult) return;
    setPlan((p) => {
      let next = { ...p, [day]: { ...p[day] } };
      MEALS.forEach((m) => (next[day][m] = [...next[day][m]]));
      const mealKcal = Object.fromEntries(MEALS.map((m) => [m, next[day][m].reduce((s, x) => s + ((foodMap[x.id] || {}).kcal || 0) * x.qty, 0)]));
      fixResult.picks.forEach(({ id, qty }) => {
        // put each pick in the currently lightest meal
        const meal = MEALS.reduce((a, b) => (mealKcal[a] <= mealKcal[b] ? a : b));
        const items = next[day][meal];
        const i = items.findIndex((x) => x.id === id);
        if (i >= 0) items[i] = { ...items[i], qty: items[i].qty + qty };
        else items.push({ id, qty });
        mealKcal[meal] += ((foodMap[id] || {}).kcal || 0) * qty;
      });
      return next;
    });
    setFixModal(false);
  };

  /* ---- AI: estimate custom food ---- */
  const estimateFood = async () => {
    if (!newFood.name.trim()) return;
    setEstimating(true); setEstError(""); setEstimated(null);
    try {
      const j = await askClaudeJSON(
        `You are a nutrition database. Estimate per-serving nutrition for this food: "${newFood.name}", serving size: "${newFood.serv || "1 standard serving"}". Indian brands/context are fine. Respond with ONLY raw JSON, no markdown fences, no commentary, exactly these numeric fields:\n{"kcal":0,"p":0,"c":0,"f":0,"fiber":0,"ca":0,"fe":0,"b12":0,"d":0,"zn":0,"mg":0,"k":0,"vc":0,"serv":"normalized serving text"}\nUnits: kcal; grams for p,c,f,fiber; mg for ca,fe,zn,mg,k,vc; micrograms for b12,d.`

      setEstimated(j);

  const saveCustomFood = () => {

      fiber: +estimated.fiber || 0, ca: +estimated.ca || 0, fe: +estimated.fe || 0, b12: +estimated.b12 || 0,
      d: +estimated.d || 0, zn: +estimated.zn || 0, mg: +estimated.mg || 0, k: +estimated.k || 0, vc: +estimated.vc || 0,

  const openRecipe = async (food) => {

        `Search the web for one simple lacto-vegetarian (no eggs, no meat) recipe for "${food.name}". Prefer recipes under 20 minutes for a beginner cook in India. Then respond with ONLY raw JSON, no markdown fences, no commentary:\n{"title":"","sourceUrl":"","totalTime":"","servings":"","ingredients":["..."],"steps":["..."]}\nKeep ingredients as short single lines with quantities, and steps concise (max 8 steps). sourceUrl must be the real recipe page URL you found.`,
        true
      );
      setRecipe(j);
    } catch (e) {
      setRecipeError(e.code === "NO_KEY" || e.code === "BAD_KEY"

        : "Couldn't fetch a recipe right now. Try again in a moment.");

  };

  const shownFoods = allFoods.filter((f) => (cat === "All" || f.cat === cat) && f.name.toLowerCase().includes(q.toLowerCase()));

                        <span className="font-bold">{qty}</span>
                        <button onClick={(e) => { e.stopPropagation(); setQty(meal, id, 1); }} className="px-1.5 font-bold" style={{ color: T.green }}>＋</button>
                      </span>

                  className="flex items-center gap-1.5 p-2 mb-1.5 rounded-lg cursor-grab active:cursor-grabbing"
                  style={{ background: selFood === f.id ? T.greenSoft : T.bg, border: `1px solid ${selFood === f.id ? T.green : T.line}` }}>

                    <div className="text-xs font-bold truncate">{f.name}</div>

                      {f.serv} · {f.kcal} kcal · P{f.p}{f.note ? " · " + f.note : ""}

                  <button onClick={(e) => { e.stopPropagation(); addFood(addTo, f.id); }}

            </div>
          </div>

      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 p-3 pt-0">

              <div className="text-xs mb-3" style={{ color: T.soft }}>{sel.serv}{sel.note ? " · " + sel.note : ""} · {sel.cat}</div>
              <div className="grid grid-cols-4 gap-2 mb-3">

                  Suggested additions to hit your DAREBEETS calorie, protein and micronutrient targets. They'll be slotted into your lightest meals.
                </div>
                {fixResult.picks.map(({ id, qty }) => {
                  const f = foodMap[id];
                  return (
                    <div key={id} className="flex items-center gap-2 p-2 mb-1.5 rounded-lg" style={{ background: T.greenSoft }}>
                      <div className="min-w-0 flex-1">
                        <div className="text-xs font-bold">{qty > 1 ? qty + " × " : ""}{f.name}</div>
                        <div className="text-xs" style={{ color: T.soft }}>{f.serv} · {f.kcal * qty} kcal · P{Math.round(f.p * qty)}</div>
                      </div>
                    </div>
                  );
                })}
                <div className="text-xs font-bold uppercase tracking-wide mt-3 mb-1" style={{ color: T.soft }}>After adding</div>
                <Bar label="Calories" val={fixResult.projected.kcal} target={targets.kcal} unit="kcal" over />
                <Bar label="Protein" val={fixResult.projected.p} target={targets.p} unit="g" />
                <button onClick={applyFix} className="w-full py-2.5 rounded-xl font-bold text-sm mt-2" style={{ background: T.green, color: "#fff" }}>
                  Add these to {day}
                </button>
              </React.Fragment>
            )}
          </div>
        </div>
      )}

      {/* ===== Add-food modal (AI estimate) ===== */}
      {addFoodModal && (
        <div className="fixed inset-0 flex items-center justify-center p-4" style={modalBg} onClick={() => !estimating && setAddFoodModal(false)}>
          <div className="rounded-2xl p-5 w-full max-w-md overflow-y-auto" style={{ background: T.card, maxHeight: "85vh" }} onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center mb-3">
              <div className="font-bold">＋ Add a food (AI-estimated)</div>
              <button className="ml-auto text-sm px-3 py-1 rounded-lg" style={{ border: `1px solid ${T.line}` }} onClick={() => setAddFoodModal(false)}>✕</button>
            </div>
            <label className="text-xs block mb-2" style={{ color: T.soft }}>
              Food name (brand ok)
              <input value={newFood.name} onChange={(e) => setNewFood((n) => ({ ...n, name: e.target.value }))}
                placeholder="e.g. Amul lassi, Britannia cheese cube, ragi dosa" style={{ ...inputStyle, marginTop: 2 }} />
            </label>
            <label className="text-xs block mb-3" style={{ color: T.soft }}>
              Serving size (optional)
              <input value={newFood.serv} onChange={(e) => setNewFood((n) => ({ ...n, serv: e.target.value }))}
                placeholder="e.g. 200 ml / 1 piece / 100 g" style={{ ...inputStyle, marginTop: 2 }} />
            </label>
            {estimating ? (
              <Spinner text="Estimating nutrition with AI…" />
            ) : estimated ? (
              <React.Fragment>
                <div className="grid grid-cols-4 gap-2 mb-2">
                  {[["kcal", estimated.kcal, "kcal"], ["Protein", estimated.p, "g"], ["Carbs", estimated.c, "g"], ["Fat", estimated.f, "g"]].map(([lb, v, u]) => (
                    <div key={lb} className="rounded-lg p-2 text-center" style={{ background: T.greenSoft }}>
                      <div className="font-bold text-sm">{v}<span className="text-xs font-normal" style={{ color: T.soft }}> {u}</span></div>
                      <div className="text-xs" style={{ color: T.soft }}>{lb}</div>
                    </div>
                  ))}
                </div>
                <div className="grid grid-cols-3 gap-x-3 text-xs mb-3">
                  {MICRO_TARGETS.map(([k, lb, , u]) => (
                    <div key={k} className="flex justify-between py-0.5">
                      <span style={{ color: T.soft }}>{lb}</span>
                      <span className="font-semibold">{estimated[k] || 0} {u}</span>
                    </div>
                  ))}
                </div>
                <div className="flex gap-2">
                  <button onClick={estimateFood} className="flex-1 py-2 rounded-xl text-sm font-semibold" style={{ border: `1px solid ${T.line}` }}>Re-estimate</button>
                  <button onClick={saveCustomFood} className="flex-1 py-2 rounded-xl text-sm font-bold" style={{ background: T.green, color: "#fff" }}>Add to library</button>
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                {estError && <div className="text-xs mb-2 p-2 rounded-lg" style={{ background: T.mangoSoft }}>{estError}</div>}
                <button onClick={estimateFood} disabled={!newFood.name.trim()}
                  className="w-full py-2.5 rounded-xl font-bold text-sm"
                  style={{ background: newFood.name.trim() ? T.green : T.line, color: "#fff" }}>
                  ✨ Estimate nutrition with AI
                </button>
              </React.Fragment>
            )}
          </div>
        </div>
      )}

      {/* ===== Grocery modal ===== */}
      {grocery && (
        <div className="fixed inset-0 flex items-center justify-center p-4" style={modalBg} onClick={() => setGrocery(false)}>
          <div className="rounded-2xl p-5 w-full max-w-md overflow-y-auto" style={{ background: T.card, maxHeight: "80vh" }} onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center mb-3">
              <div className="font-bold">🛒 Grocery list — whole week</div>
              <button className="ml-auto text-sm px-3 py-1 rounded-lg" style={{ border: `1px solid ${T.line}` }} onClick={() => setGrocery(false)}>✕</button>
            </div>
            {Object.keys(groceryList).length === 0 ? (
              <div className="text-sm py-6 text-center" style={{ color: T.soft }}>
                Plan some meals first — the list builds itself from your week.
              </div>
            ) : (
              <React.Fragment>
                {Object.entries(groceryList).map(([c, items]) => (
                  <div key={c} className="mb-3">
                    <div className="text-xs font-bold uppercase tracking-wide mb-1" style={{ color: T.green }}>{c}</div>
                    {items.map((i) => (
                      <label key={i.id} className="flex items-center gap-2 py-1 text-sm cursor-pointer">
                        <input type="checkbox" style={{ accentColor: T.green }} />
                        <span className="font-semibold">{i.name}</span>
                        <span className="ml-auto text-xs" style={{ color: T.soft }}>{i.n} × {i.serv}</span>
                      </label>
                    ))}
                  </div>
                ))}
                <button onClick={copyGrocery} className="w-full py-2.5 rounded-xl font-bold text-sm"
                  style={{ background: copied ? T.mango : T.green, color: copied ? "#3D2A05" : "#fff" }}>
                  {copied ? "Copied ✓" : "Copy list to clipboard"}
                </button>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MealPlanner />);
  </script>
</body>
</html>
